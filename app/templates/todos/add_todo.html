<div class="modal fade" id="addTodoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <form method="POST" action="{{ url_for('home.add_todo') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-plus-circle me-2"></i>Add New Todo
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="mb-3">
                        <label for="addTitle" class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="addTitle" name="title"
                            placeholder="e.g., Finish project report" required maxlength="100">
                    </div>

                    <div class="mb-3">
                        <label for="addDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="addDescription" name="description"
                            placeholder="Add details..." rows="3" maxlength="500"></textarea>
                    </div>

                    <div class="mb-0">
                        <label class="form-label">Priority</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="priority" id="prioLow" value="low" checked>
                            <label class="btn btn-outline-success btn-sm" for="prioLow">Low</label>

                            <input type="radio" class="btn-check" name="priority" id="prioMed" value="medium">
                            <label class="btn btn-outline-warning btn-sm" for="prioMed">Medium</label>

                            <input type="radio" class="btn-check" name="priority" id="prioHigh" value="high">
                            <label class="btn btn-outline-danger btn-sm" for="prioHigh">High</label>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-gradient text-white">
                        <i class="bi bi-check-lg me-1"></i> Create Todo
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
