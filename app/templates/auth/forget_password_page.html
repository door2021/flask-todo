{% extends "base.html" %}
{% block title %}Forgot Password - Todo App{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">

                <div class="card auth-card p-4 p-md-5">
                    <div class="card-body">

                        <div class="text-center mb-4">
                            <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                                style="width: 60px; height: 60px;">
                                <i class="bi bi-key fs-3" style="color: var(--primary-start);"></i>
                            </div>
                            <h2 class="fw-bold text-dark mb-1">Forgot Password?</h2>
                            <p class="text-muted mb-0">Enter your email to receive a reset link</p>
                        </div>

                        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                            <div class="mb-4">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="you@example.com"
                                    value="{{ request.form.email if request.form else '' }}" required autofocus>
                                <small class="text-muted d-block mt-1">
                                    We'll send a password reset link to this email
                                </small>
                            </div>

                            <button type="submit" class="btn btn-gradient btn-lg w-100 mb-3 text-white">
                                <i class="bi bi-envelope me-2"></i>Send Reset Link
                            </button>

                            <div class="text-center">
                                <a href="{{ url_for('auth.sign_in') }}" class="text-decoration-none small"
                                    style="color: var(--primary-start);">
                                    <i class="bi bi-arrow-left me-1"></i>Back to Sign In
                                </a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
