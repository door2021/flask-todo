{% extends "base.html" %}
{% block title %}Reset Password - Todo App{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">

                <div class="card auth-card p-4 p-md-5">
                    <div class="card-body">

                        <div class="text-center mb-4">
                            <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                                style="width: 60px; height: 60px;">
                                <i class="bi bi-lock fs-3" style="color: var(--primary-start);"></i>
                            </div>
                            <h2 class="fw-bold text-dark mb-1">Reset Password</h2>
                            <p class="text-muted mb-0">Create a new password for your account</p>
                        </div>

                        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                            <div class="mb-3">
                                <label for="password" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="••••••••" required minlength="6" autofocus>
                                <small class="text-muted">At least 6 characters</small>
                            </div>

                            <div class="mb-4">
                                <label for="confirm_password" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirm_password"
                                    name="confirm_password" placeholder="••••••••" required minlength="6">
                            </div>

                            <button type="submit" class="btn btn-gradient btn-lg w-100 mb-3 text-white">
                                <i class="bi bi-check-lg me-2"></i>Reset Password
                            </button>

                            <div class="text-center">
                                <a href="{{ url_for('auth.sign_in') }}" class="text-decoration-none small"
                                    style="color: var(--primary-start);">
                                    <i class="bi bi-arrow-left me-1"></i>Back to Sign In
                                </a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirm_password');

        function validatePasswords() {
            if (confirm.value && password.value !== confirm.value) {
                confirm.setCustomValidity('Passwords do not match');
            } else {
                confirm.setCustomValidity('');
            }
        }

        password.addEventListener('change', validatePasswords);
        confirm.addEventListener('keyup', validatePasswords);
    });
</script>
{% endblock %}
