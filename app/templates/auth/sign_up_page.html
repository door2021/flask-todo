{% extends "base.html" %}
{% block title %}Sign Up - Todo App{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">

                <div class="card auth-card p-4 p-md-5">
                    <div class="card-body">

                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-dark mb-1">Create Account</h2>
                            <p class="text-muted mb-0">Sign up to manage your todos</p>
                        </div>

                        <form method="POST" action="{{ url_for('auth.sign_up') }}">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username"
                                    placeholder="Your Name" value="{{ request.form.username if request.form else '' }}"
                                    required autofocus>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="you@example.com"
                                    value="{{ request.form.email if request.form else '' }}" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="••••••••" required minlength="6">
                                <small class="text-muted">At least 6 characters</small>
                            </div>

                            <button type="submit" class="btn btn-gradient btn-lg w-100 mb-3 text-white">
                                Sign Up
                            </button>

                            <div class="text-center">
                                <span class="text-muted small">Already have an account? </span>
                                <a href="{{ url_for('auth.sign_in') }}" class="text-decoration-none fw-medium"
                                    style="color: var(--primary-start);">
                                    Sign In
                                </a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
